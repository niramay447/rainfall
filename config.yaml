# ─── Singapore (original) ────────────────────────────────────────────────────
# dataset creation parameters
dataset_parameters:
  database_folder: 'database'
  start_year: 2024
  end_year: 2025
  radar_folder: 'sg_radar_data_cropped'
  cml_file: ''
  train_size: 0.7     #training set size
  test_size: 0.1      #test set size
  seed: 111           #seed for randomness in training/test split
  geography_bounds: {
    left: 103.6,
    right: 104.1,
    top: 1.5,
    bottom: 1.188
  }

visualisation:
  bounds: [0.1, 0.2, 0.5, 1, 2, 4, 7, 10, 20]

country_info:
  name: 'Singapore'
  country_bounds: {"left": 103.6, "right": 104.1, "top": 1.5, "bottom": 1.188}

filters:
  uptime_threshold: 0.9

training_params:
  fold_count: 5
  seed: 123
  batch_size: 1024

# ─── Australia ────────────────────────────────────────────────────────────────
australia:
  # Path to the combined hourly rainfall CSV (timestamp, station_id, rainfall_mm)
  dataset_path: 'all_stations_rainfall_hourly_combined.csv'
  # Path to station metadata CSV — must have columns: id, latitude, longitude
  # Create this file from BOM station data (see README or database/australia/)
  station_metadata_path: 'database/australia/station_metadata.csv'
  geography_bounds: {
    left: 112.0,
    right: 154.0,
    top: -10.0,
    bottom: -44.0
  }
